<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>✔️ 품목정보</title>
<style>
  :root { --bd:#e2e8f0; --mut:#64748b; --accent:#2563eb; --bg:#f8fafc; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, "Malgun Gothic", sans-serif; color:#0f172a; background:var(--bg);
         display:flex; flex-direction:column; height:100vh; }
  header { flex:none; background:#fff; border-bottom:1px solid var(--bd); padding:14px 18px; z-index:10; }
  h1 { font-size:18px; margin:0 0 10px; }
  .meta { color:var(--mut); font-size:12px; font-weight:normal; }
  .controls { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  select { padding:10px; border:1px solid var(--bd); border-radius:8px; font-size:14px; }
  .count { color:var(--mut); font-size:13px; white-space:nowrap; }
  .wrap { flex:1 1 auto; overflow:auto; padding:0 18px 40px; }
  table { border-collapse:collapse; width:100%; font-size:13px; background:#fff; table-layout:fixed; }
  th, td { border:1px solid var(--bd); padding:7px 9px; text-align:left; vertical-align:top;
           white-space:pre-wrap; word-break:break-word; }
  th { background:#f1f5f9; position:sticky; top:0; cursor:pointer; user-select:none; }
  tbody tr:nth-child(even){ background:#fafbfc; }
  mark { background:#fde68a; padding:0 1px; }
  .func { color:var(--accent); font-weight:600; }
  .none { color:#94a3b8; }
  .empty { text-align:center; color:var(--mut); padding:40px; }
  .hint { color:var(--mut); font-size:12px; flex:1; min-width:180px; }
  #clearBtn, #dlBtn, #xlsxBtn { padding:9px 12px; border:1px solid var(--bd); border-radius:8px; background:#fff; cursor:pointer; font-size:13px; }
  #clearBtn:hover, #dlBtn:hover { background:#f1f5f9; }
  #xlsxBtn { border-color:#16a34a; color:#fff; background:#16a34a; font-weight:600; }
  #xlsxBtn:hover { background:#15803d; }
  #head th { top:0; }
  #filterRow th { position:sticky; top:33px; background:#f8fafc; padding:3px; }
  #filterRow input { width:100%; min-width:0; box-sizing:border-box; padding:5px 6px; border:1px solid #cbd5e1;
                     border-radius:5px; font-size:12px; font-weight:normal; -webkit-appearance:none; appearance:none; }
  #filterRow input:focus { outline:2px solid var(--accent); border-color:var(--accent); }
</style>
</head>
<body>
<header>
  <h1>✔️품목정보<span class="meta" id="meta"></span></h1>
  <div class="controls">
    <span class="hint">각 열 제목 아래 칸에 입력하면 그 항목만 검색됩니다 (여러 칸 동시 사용=AND).</span>
    <select id="filterFunc">
      <option value="all">기능성: 전체</option>
      <option value="func">기능성만</option>
      <option value="none">비기능성만</option>
    </select>
    <button id="clearBtn" type="button">검색 초기화</button>
    <button id="xlsxBtn" type="button">⬇ 엑셀 다운로드(.xlsx)</button>
    <button id="dlBtn" type="button">검색결과 CSV</button>
    <span class="count" id="count"></span>
  </div>
</header>
<div class="wrap">
  <table id="tbl">
    <thead>
      <tr id="head"></tr>
      <tr id="filterRow"></tr>
    </thead>
    <tbody id="body"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">검색 결과가 없습니다.</div>
</div>

<!-- 데이터는 Supabase 공개 URL에서 실시간으로 불러옴(발행하면 자동 최신). 로컬 파일이 있으면 그걸 우선 사용. -->
<script>
  window.__DATAJS__ = "https://qvyrbsfimrjvfrdpuswc.supabase.co/storage/v1/object/public/item-info/data.js";
</script>
<script>
  // 같은 폴더에 data.js 있으면 로컬 우선, 없으면 Supabase에서 로드
  var s=document.createElement("script");
  s.src = (location.protocol==="file:") ? "data.js" : window.__DATAJS__;
  s.onerror = function(){ var f=document.createElement("script"); f.src=window.__DATAJS__; f.onload=boot; document.head.appendChild(f); };
  s.onload = boot;
  document.head.appendChild(s);
  function boot(){ if(window.__booted) return; window.__booted=true; init(); }
</script>
<script>
function init(){
const DATA = window.ITEM_DATA || {columns:[], rows:[]};
const COLS = [
  {key:"code",  label:"품목코드", w:"105px"},
  {key:"name",  label:"품목명", w:"320px"},
  {key:"form",  label:"제형", w:"120px"},
  {key:"criteria", label:"기능성 기준", w:"210px"},
  {key:"approved", label:"이미 삼사받은 품목의 제품명", w:"170px"},
  {key:"status", label:"품목상태", w:"88px"},
  {key:"content_code", label:"내용물코드", w:"120px"},
  {key:"content_name", label:"내용물명", w:"300px"},
];
const NONFUNC = new Set(["", "-", "_", "None"]);
function isFunc(crit){
  if(crit==null) return false;
  for(const line of String(crit).split("\n")){
    const t=line.trim(); if(!t) continue;
    const val = t.includes(":") ? t.split(/:(.*)/s)[1] : t;
    if(!NONFUNC.has((val||"").trim())) return true;
  }
  return false;
}
let sortKey=null, sortAsc=true, lastRows=[];

document.getElementById("meta").textContent =
  `(총 ${DATA.count||DATA.rows.length}건${DATA.generated_at ? " · 업데이트 "+DATA.generated_at : ""})`;
const head=document.getElementById("head");
const filterRow=document.getElementById("filterRow");
const colInputs={};
const colTh={};
COLS.forEach(c=>{
  const th=document.createElement("th"); th.textContent=c.label;
  th.title="클릭하면 이 열로 정렬"; colTh[c.key]=th;
  if(c.w) th.style.width=c.w;
  th.onclick=()=>{ if(sortKey===c.key){sortAsc=!sortAsc;} else {sortKey=c.key;sortAsc=true;} render(); };
  head.appendChild(th);
  const fth=document.createElement("th");
  if(c.w) fth.style.width=c.w;
  const inp=document.createElement("input");
  inp.type="search"; inp.placeholder=c.label+" 검색";
  inp.addEventListener("input", render);
  colInputs[c.key]=inp; fth.appendChild(inp); filterRow.appendChild(fth);
});

function esc(s){ return String(s).replace(/[&<>]/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m])); }
function hl(s, q){ s=esc(s); if(!q) return s;
  try{ return s.replace(new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig"),"<mark>$1</mark>"); }catch(e){ return s; } }

function render(){
  // 정렬 화살표는 현재 정렬 중인 열에만 표시 (헤더 두줄 방지)
  COLS.forEach(c=>{ colTh[c.key].textContent = c.label + (sortKey===c.key ? (sortAsc?" ▴":" ▾") : ""); });
  const ff=document.getElementById("filterFunc").value;
  // 각 열별 검색어 수집 (빈 칸은 무시)
  const terms={};
  COLS.forEach(c=>{ const v=colInputs[c.key].value.trim().toLowerCase(); if(v) terms[c.key]=v; });
  let rows=DATA.rows.filter(r=>{
    for(const k in terms){ if(!String(r[k]||"").toLowerCase().includes(terms[k])) return false; }
    if(ff==="func" && !isFunc(r.criteria)) return false;
    if(ff==="none" && isFunc(r.criteria)) return false;
    return true;
  });
  if(sortKey) rows.sort((a,b)=>{ const x=(a[sortKey]||""),y=(b[sortKey]||"");
    return (x>y?1:x<y?-1:0)*(sortAsc?1:-1); });
  lastRows=rows;   // 현재 검색 결과(다운로드용)
  const body=document.getElementById("body"); body.innerHTML="";
  rows.slice(0,1000).forEach(r=>{
    const tr=document.createElement("tr");
    COLS.forEach(c=>{ const td=document.createElement("td");
      let v=r[c.key]||"";
      td.innerHTML=hl(v, terms[c.key]||"");
      if(c.key==="criteria") td.className=isFunc(v)?"func":"none";
      tr.appendChild(td); });
    body.appendChild(tr);
  });
  document.getElementById("empty").style.display = rows.length? "none":"block";
  document.getElementById("count").textContent =
     `${rows.length}건${rows.length>1000?" (1000건만 표시)":""}`;
}
// 엑셀 다운로드: 현재 검색결과를 '한 셀에 한 값'(내용물코드마다 행 분리)으로 CSV 저장
function csvCell(v){ v=String(v==null?"":v); return /[",\n\r]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; }
function downloadCSV(){
  const base=COLS.filter(c=>c.key!=="content_code"&&c.key!=="content_name");
  const lines=[ base.map(c=>c.label).concat(["내용물코드","내용물명"]).map(csvCell).join(",") ];
  lastRows.forEach(r=>{
    const codes=(r.content_codes&&r.content_codes.length)?r.content_codes:[""];
    const names=r.content_names||[];
    codes.forEach((code,i)=>{
      lines.push( base.map(c=>csvCell(r[c.key]||"")).concat([csvCell(code),csvCell(names[i]||"")]).join(",") );
    });
  });
  const csv="﻿"+lines.join("\r\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const d=new Date(), pad=n=>String(n).padStart(2,"0");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`품목정보_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.csv`;
  a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
document.getElementById("dlBtn").addEventListener("click", downloadCSV);

// 엑셀(.xlsx) 다운로드: 브라우저에서 ExcelJS로 직접 생성(서식 포함, 전체 데이터)
function loadExcelJS(){
  return new Promise((res,rej)=>{
    if(window.ExcelJS) return res();
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js";
    s.onload=()=>res(); s.onerror=()=>rej(new Error("엑셀 라이브러리 로드 실패(인터넷 확인)"));
    document.head.appendChild(s);
  });
}
const XLSX_COLS=[
  {h:"품목코드", k:"code", w:14},
  {h:"품목명", k:"name", w:71.25},
  {h:"제형", k:"form", w:14.5},
  {h:"기능성 기준", k:"criteria", w:31.6},
  {h:"이미 삼사받은 품목의 제품명", k:"approved", w:36.75},
  {h:"품목상태", k:"status", w:9},
  {h:"내용물코드", k:"__code", w:15.25},
  {h:"내용물명", k:"__name", w:40},
];
async function downloadXLSX(){
  const btn=document.getElementById("xlsxBtn"), old=btn.textContent;
  btn.textContent="엑셀 만드는 중…"; btn.disabled=true;
  try{
    await loadExcelJS();
    const wb=new ExcelJS.Workbook();
    const ws=wb.addWorksheet("품목정보", {views:[{state:"frozen", ySplit:1, zoomScale:85, zoomScaleNormal:85}]});
    ws.columns=XLSX_COLS.map(c=>({header:c.h, width:c.w}));
    const hr=ws.getRow(1); hr.height=33;
    hr.eachCell(c=>{ c.font={name:"맑은 고딕",size:11,bold:true};
      c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFC8E4F3"}};
      c.alignment={horizontal:"left",vertical:"middle"}; });
    DATA.rows.forEach(r=>{
      const codes=(r.content_codes&&r.content_codes.length)?r.content_codes:[""];
      const names=r.content_names||[];
      codes.forEach((code,i)=>{
        const row=ws.addRow([r.code,r.name,r.form,r.criteria,r.approved,r.status,code,names[i]||""]);
        row.height=33;
        row.eachCell(c=>{ c.font={name:"맑은 고딕",size:11}; c.alignment={vertical:"middle"}; });
      });
    });
    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const d=new Date(), pad=n=>String(n).padStart(2,"0");
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=`품목정보_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.xlsx`;
    a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1500);
  }catch(e){ alert("엑셀 생성 실패: "+e.message); }
  finally{ btn.textContent=old; btn.disabled=false; }
}
document.getElementById("xlsxBtn").addEventListener("click", downloadXLSX);
document.getElementById("filterFunc").addEventListener("change", render);
document.getElementById("clearBtn").addEventListener("click", ()=>{
  COLS.forEach(c=>colInputs[c.key].value=""); document.getElementById("filterFunc").value="all"; render();
});
render();
}
</script>
</body>
</html>
